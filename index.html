<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student GPA Tracker</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="topbar">

    <div>
      <h1>🎓 Student GPA Tracker</h1>
      <p>Track SGPA & CGPA effortlessly</p>
    </div>

    <div class="cgpa-box" onclick="openCGPACalculator()">
      <span>CGPA</span>
      <h2 id="cgpa">0.00</h2>
    </div>

  </header>

  <!-- DASHBOARD -->
  <section class="dashboard">

    <div class="card">
      <h3>Current SGPA</h3>
      <p id="sgpaCard">0.00</p>
    </div>

    <div class="card">
      <h3>Total Credits</h3>
      <p id="creditsCard">0</p>
    </div>

    <div class="card">
      <h3>Current Grade</h3>
      <p id="gradeCard">-</p>
    </div>

  </section>

  <!-- CONTROLS -->
  <section class="controls">

    <!-- COLLEGE -->
    <select id="schemeSelect">
      <option value="">Select College</option>

      <option value="RTU">RTU</option>
      <option value="SKIT">SKIT</option>
      <option value="POORNIMA">POORNIMA</option>
      <option value="LMNIT">LMNIT</option>

      <option value="CUSTOM">
        Universal Calculator
      </option>
    </select>

    <!-- DEPARTMENT -->
    <select id="branchSelect">
      <option value="">Select Department</option>
    </select>

    <!-- SEMESTER -->
    <select id="semSelect">
      <option value="">Select Semester</option>
    </select>

    <button onclick="loadData()">
      Load Semester
    </button>

  </section>

  <!-- CUSTOM CALCULATOR -->
  <section id="customControls" class="hidden">

    <div class="custom-header">

      <h3>Universal SGPA Calculator</h3>

      <button onclick="addCustomSubject()">
        + Add Subject
      </button>

    </div>

  </section>

  <!-- TABLE -->
  <section class="table-section">

    <div class="table-card">

      <table>

        <thead>

          <tr>

            <th>Subject</th>

            <th>Credits</th>

            <th>Marks</th>

            <th>Grade</th>

            <th>Points</th>

            <th>Action</th>

          </tr>

        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

  </section>

  <!-- SGPA -->
  <section class="result-section">

    <div class="result-card">

      <h2>Semester GPA</h2>

      <h1 id="sgpa">0.00</h1>

    </div>

  </section>



  <!-- CGPA MODAL -->
  <div id="cgpaModal" class="modal hidden">

    <div class="modal-box">

      <h2>📊 CGPA Calculator</h2>

      <p>
        Enter SGPA of completed semesters
      </p>

      <div id="sgpaInputs">

        <div class="sgpa-row">

          <label>Semester 1</label>

          <input
            type="number"
            step="0.01"
            min="0"
            max="10"
            class="cgpaInput"
          >

        </div>

      </div>

      <div class="cgpa-buttons">

        <button onclick="addSGPAInput()">
          + Add Semester
        </button>

        <button onclick="calculateCGPAFromInput()">
          Calculate CGPA
        </button>

        <button onclick="closeCGPACalculator()">
          Close
        </button>

      </div>

      <h2 id="cgpaResult"></h2>

    </div>

  </div>

  <!-- LOADER -->
  <div id="loader" class="hidden">
    Loading...
  </div>

  <script src="app.js"></script>

</body>

</html>
